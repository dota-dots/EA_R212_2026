<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon super site</title>
    <style>
          /* ============================
             PROBLÈMES CSS À TROUVER :
             - styles dans le HTML (pas de fichier externe)
             - !important
             - sélecteurs trop spécifiques
             - hauteurs fixes
             - pas de variables CSS
             - pas de responsive
             - pas de transitions
             ============================ */

             :root {
        /* Couleurs */
        --color-primary: white;
        --color-text: #1f2937;
        --color-secondary: #3b4cc0;
        --color-troisieme: #666;
        --color-bg: #1a1a2e;
        --color-bg-alt: #f9fafb;

        /* Espacements */
        --space-sm: 0.5rem;
        --space-md: 1rem;
        --space-lg: 2rem;
        --space-xl: 4rem;

          * { margin: 0; padding: 0; box-sizing: border-box; }

          body {
            font-family: Arial;
            color: var(--color-text);
          }

          .header {
            background: var(--color-bg);
            color: var(--color-primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          }

          .header .titre {
            font-size: 24px;
            font-weight: bold;
          }

          .header .nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
          }

          .nav ul li a {
            color: var(--color-bg-alt);
            text-decoration: none;
          }

          .intro {
            padding: 40px 20px;
            text-align: center;
            background: var(--color-bg-alt);
          }
      /* Faudra changer ici et en haut */
          .intro-titre {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
          }

          .section {
            padding: 20px;
          }
      /* jai changer ici */
          .section .titre {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
          }

          .filtres-container {
            margin-bottom: 15px;
          }

          .filtres-container span {
            display: inline-block;
            padding: 5px 12px;
            margin-right: 8px;
            background: var(--color-bg-alt);
            cursor: pointer;
          }

          .filtres-container span.actif {
            background: var(--color-bg); /* ajoutez var CSS */
            color: var(--color-primary) ;
          }

          .grille-projets {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
          }

          .carte-projet {
            width: 100%;
            min-height: 300px;
            border: 1px solid var(--color-bg-alt);
            padding: 15px;
            background: var(--color-primary);
          }

          .carte-titre {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
          }

           .carte-description {
            color: #666;
            margin-bottom: 10px;
          }

          .carte-tags span {
            display: inline-block;
            padding: 2px 8px;
            background: var(--color-bg-alt);
            color: var(--color-secondary);
            font-size: 12px;
            margin-right: 4px;
          }

          .carte-bouton {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: var(--color-text);
            color: var(--color-primary);
            border: none;
            cursor: pointer;
          }

          button:focus,
          .carte-bouton:focus,
          .modale-fermer:focus,
          .filtres-container button:focus {
            outline: 3px solid var(--color-secondary);
            outline-offset: 3px;
          }

          .modale-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--color-bg);
            z-index: 100;
          }

          .modale-overlay.open {
            display: block;
          }

          .modale-contenu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-primary);
            padding: 30px;
            width: 500px;
            max-height: 80vh;
            overflow-y: auto;
          }

          .modale-fermer {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
          }

          .footer {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
          }


        @media (min-width: 600px) {
            .grille-projets {
              justify-content: space-between;
            }

            .carte-projet {
              width: 48%;
            }
          }

          @media (min-width: 1000px) {
            .carte-projet {
              width: 10px;
            }
          }
    </style>
  </head>
  <body>
    <!-- PROBLÈME : pas de balises sémantiques, tout est en div -->
    <header>
      <title>Portfolio</title>
      <nav>
        <ul>
          <li><a href="#projets">Projets</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <content>
        <intro>
          <h1>Bienvenue sur mon portfolio</h1>
          <h2>Étudiante en MMI, passionnée par le web.</h2>
        </intro>

        <div class="projets-section" id="projets">
          <div class="section-titre">Mes projets</div>

          <div class="filtres-container">
            container
            <button onclick="filtrer('tous')">Tous</button>
            <button onclick="filtrer('HTML')">HTML</button>
            <button onclick="filtrer('CSS')">CSS</button>
            <button onclick="filtrer('JS')">JS</button>
          </div>

          <div class="grille-projets" id="grille">
            <!-- Rempli par JS -->
          </div>
        </div>
      </content>
    </main>

    <!-- Modale -->
    <div class="modale-overlay" id="modale" aria-hidden="true">
      <div class="modale-contenu">
        <span class="modale-fermer" onclick="fermerModale()">×</span>
        <div id="modale-body"></div>
      </div>
    </div>

    <footer>
      <p>© 2026 — Mon portfolio</p>
    </footer>

    <script>
      // ============================
      // PROBLÈMES JS À TROUVER :
      // - onclick inline (pas addEventListener)
      // - getElementById au lieu de querySelector
      // - element.style au lieu de classList
      // - pas de gestion clavier (Escape, Tab)
      // - pas d'attributs aria
      // - données et affichage mélangés
      // ============================

      var projets = [
        {
          id: 1,
          titre: "Site vitrine",
          description:
            "Un site pour une boulangerie locale. Design responsive et moderne.",
          tags: ["HTML", "CSS"],
        },
        {
          id: 2,
          titre: "Quiz interactif",
          description: "Application de quiz avec score et timer.",
          tags: ["JS", "HTML"],
        },
        {
          id: 3,
          titre: "Portfolio v1",
          description: "Ma première version de portfolio.",
          tags: ["HTML", "CSS"],
        },
        {
          id: 4,
          titre: "Dashboard météo",
          description: "Tableau de bord météo avec API Open Meteo.",
          tags: ["JS", "CSS"],
        },
        {
          id: 5,
          titre: "Blog tech",
          description: "Blog statique sur le développement web.",
          tags: ["HTML", "CSS", "JS"],
        },
        {
          id: 6,
          titre: "Jeu du pendu",
          description: "Jeu du pendu en JavaScript vanilla.",
          tags: ["JS"],
        },
      ];

      function afficherProjets(liste) {
        var grille = document.getElementById("grille");
        grille.innerHTML = "";
        for (var i = 0; i < liste.length; i++) {
          var p = liste[i];
          var carte = document.createElement("div");
          carte.className = "carte-projet";
          carte.innerHTML =
            '<div class="carte-titre">' +
            p.titre +
            "</div>" +
            '<div class="carte-description">' +
            p.description +
            "</div>" +
            '<div class="carte-tags">' +
            p.tags
              .map(function (t) {
                return "<span>" + t + "</span>";
              })
              .join("") +
            "</div>" +
            '<button class="carte-bouton" onclick="ouvrirModale(' +
            p.id +
            ')"aria-expanded="false">Voir détail</button>';
          grille.appendChild(carte);
        }
      }

      function filtrer(tag) {
        // Gestion visuelle des filtres actifs
        var filtres = document.getElementById(".filtre");
        for (var i = 0; i < filtres.length; i++) {
          filtres[i].style.background = "#ddd";
          filtres[i].style.color = "#333";
        }
        event.target.style.background = "#1a1a2e";
        event.target.style.color = "white";

        if (tag === "tous") {
          afficherProjets(projets);
        } else {
          var filtres = projets.filter(function (p) {
            return p.tags.indexOf(tag) !== -1;
          });
          afficherProjets(filtres);
        }
      }

      function ouvrirModale(id) {
        var projet = null;
        for (var i = 0; i < projets.length; i++) {
          if (projets[i].id === id) {
            projet = projets[i];
            break;
          }
        }
        if (!projet) return;

        document.getElementById("modale-body").innerHTML =
          "<h2>" +
          projet.titre +
          "</h2>" +
          "<p>" +
          projet.description +
          "</p>" +
          "<p>Tags : " +
          projet.tags.join(", ") +
          "</p>";

        document.getElementById("modale").classList.add("open");
      }

      function fermerModale() {
        document.getElementById("modale").classList.remove("open");
      }

      afficherProjets(projets);
    </script>
  </body>
</html>
